name: Build Provider

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: provider/go.sum

      - name: Install Pulumi CLI and pulumictl
        run: |
          curl -fsSL https://get.pulumi.com | sh && echo "$HOME/.pulumi/bin" >> $GITHUB_PATH
          curl -fsSLo pulumictl.tar.gz https://github.com/pulumi/pulumictl/releases/latest/download/pulumictl-v1.0.3-linux-amd64.tar.gz
          tar -xzf pulumictl.tar.gz
          sudo mv pulumictl /usr/local/bin/

      - name: Build provider
        run: make provider

      - name: Verify provider binary
        run: ./bin/pulumi-resource-runpod --help